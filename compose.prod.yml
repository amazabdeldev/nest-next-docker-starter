# compose.prod.yml
services:

  db:
    image: postgres:alpine3.22
    restart: always
    container_name: postgresdb-prod
    env_file:
      - ./backend/.env.production
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: nestjs-prod:latest
    container_name: server-prod
    build:
      target: production
      args:
        - NODE_ENV=${NODE_ENV}
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pg_data:
